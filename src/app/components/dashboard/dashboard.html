<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__logo">🖥️</span>
      <span class="sidebar__name">SoftCorp</span>
    </div>

    <nav class="sidebar__nav">
      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.url"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: item.url === '/dashboard' }"
        class="sidebar__link"
      >
        <span class="sidebar__link-icon">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar__footer">
      <div class="sidebar__user-info">
        <span class="sidebar__user">{{ userName }}</span>
        <span class="sidebar__perfil">{{ perfilLabel }}</span>
      </div>
      <button class="sidebar__logout" (click)="logout()">Salir</button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <header class="topbar">
      <h2 class="topbar__title">Panel de Control</h2>
      <div class="topbar__user">
        <span>{{ userName }}</span>
        <span class="topbar__perfil-badge">{{ perfilLabel }}</span>
      </div>
    </header>

    <div class="page-content">
      <router-outlet />
    </div>
  </main>

</div>
