<div class="mant">
  <div class="mant__header">
    <div>
      <h1>📖 Diccionario de Fallas</h1>
      <p>Consulta y registra soluciones a problemas comunes.</p>
    </div>
    <div class="mant__header-actions">
      <button
        *ngIf="esTecnico || esJefe"
        class="btn btn--primary"
        (click)="abrirNueva()"
      >➕ Nueva Falla</button>
      <div class="filter-group">
        <input
          type="text"
          [(ngModel)]="busqueda"
          placeholder="Buscar problema..."
          class="filter-input"
          (keyup.enter)="buscar()"
        />
        <button class="btn btn--outline" (click)="buscar()">🔍 Buscar</button>
      </div>
    </div>
  </div>

  <div *ngIf="isLoading" class="loading">Cargando diccionario...</div>

  <div *ngIf="!isLoading" class="mant__table-wrap">
    <table class="mant__table">
      <thead>
        <tr>
          <th>#</th>
          <th>Problema Común</th>
          <th>Solución Sugerida</th>
          <th>Fecha Registro</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let f of fallas; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ f.problemaComun }}</td>
          <td>{{ f.solucionSugerida }}</td>
          <td>{{ f.fechaRegistro | date:'short' }}</td>
        </tr>
        <tr *ngIf="fallas.length === 0">
          <td colspan="4" style="text-align:center; color:#888; padding:2rem;">
            No hay fallas registradas.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- MODAL NUEVA FALLA -->
  <div class="mant-modal-overlay" *ngIf="showModal" (click)="cerrarModal()">
    <div class="mant-modal" (click)="$event.stopPropagation()">
      <div class="mant-modal__header">
        <h2>➕ Nueva Falla</h2>
        <button class="mant-modal__close" (click)="cerrarModal()">✕</button>
      </div>
      <div class="mant-modal__body">
        <div class="form-group">
          <label>Problema Común *</label>
          <input
            type="text"
            [(ngModel)]="formData.problemaComun"
            placeholder="Ej: PC no enciende, pantalla azul..."
          />
        </div>
        <div class="form-group">
          <label>Solución Sugerida *</label>
          <textarea
            rows="4"
            [(ngModel)]="formData.solucionSugerida"
            placeholder="Describe la solución paso a paso..."
          ></textarea>
        </div>
      </div>
      <div class="mant-modal__footer">
        <button class="btn btn--outline" (click)="cerrarModal()">Cancelar</button>
        <button class="btn btn--primary" (click)="guardar()">Registrar</button>
      </div>
    </div>
  </div>
</div>
